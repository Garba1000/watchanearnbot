<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch & Earn Pro</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<style>
body { font-family: Arial; text-align:center; background:#f5f5f5; }
.button {
  display:block;
  width:220px;
  margin:10px auto;
  padding:12px;
  background:#007bff;
  color:#fff;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<h2>🎥 Watch & Earn</h2>
<p>Balance: $<span id="walletBalance">0.00</span></p>
<p id="vipStatus">👤 Normal User</p>

<button class="button" id="watchBtn">🎬 Watch Videos</button>
<button class="button" id="taskBtn">✅ Tasks</button>
<button class="button" id="walletBtn">👛 Wallet</button>

<!-- VIDEO -->
<div id="videoFeed" style="display:none;">
  <iframe id="ytPlayer" width="100%" height="250"></iframe>
  <p id="timerText">⏳ Watching...</p>
</div>

<!-- TASK -->
<div id="taskSection" style="display:none;">
  <h3>🎯 Daily Tasks</h3>

  <adsgram-task id="currentTask" data-block-id="task-22205"></adsgram-task>

  <p id="taskMsg" style="color:green;display:none;"></p>
  <p id="taskLimit" style="color:red;display:none;"></p>
</div>

<!-- WALLET -->
<div id="walletSection" style="display:none;">
  <h3>Wallet</h3>

  <select id="method" class="button">
    <option value="opay">Opay</option>
    <option value="payeer">Payeer</option>
    <option value="crypto">Crypto</option>
  </select>

  <input id="details" placeholder="Account / Wallet" class="button">
  <input id="amount" type="number" placeholder="Amount" class="button">

  <button class="button" id="withdrawBtn">Withdraw</button>

  <ul id="history"></ul>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const userId = tg.initDataUnsafe.user?.id;
if(!userId){ alert("Unauthorized"); }

/* ADSGRAM */
const RewardAd = window.Adsgram.init({blockId:"27001"});

/* WALLET */
async function getBalance(){
  let r = await fetch(`https://api.telebothost.com/bot/properties/get?key=balance_${userId}`);
  let d = await r.json();
  return parseFloat(d.value)||0;
}

async function setBalance(val){
  await fetch(`https://api.telebothost.com/bot/properties/set?key=balance_${userId}&value=${val}`);
}

async function updateUI(){
  let b = await getBalance();
  document.getElementById("walletBalance").textContent = b.toFixed(3);
}
updateUI();

/* HISTORY */
function saveHistory(type, amt){
  let h = JSON.parse(localStorage.getItem("h"))||[];
  h.unshift({type,amt,date:new Date().toLocaleString()});
  localStorage.setItem("h",JSON.stringify(h));
}

/* REWARD */
async function addReward(a){
  let b = await getBalance();
  let n = b + a;
  await setBalance(n);
  saveHistory("Earn",a);
  updateUI();
}

/* VIDEO SYSTEM */
let videos=[
"https://www.youtube.com/embed/dQw4w9WgXcQ",
"https://www.youtube.com/embed/3JZ_D3ELwOQ"
];

let i=0,watch=0,engage=0,lastAd=0;
let totalWatch = parseInt(localStorage.getItem("watchCount"))||0;

/* VIP CHECK */
function checkVIP(){
  if(totalWatch >= 20){
    localStorage.setItem("vip","yes");
  }
}

function updateVIP(){
  let vip = localStorage.getItem("vip");
  document.getElementById("vipStatus").textContent =
    vip==="yes" ? "💎 VIP User" : "👤 Normal User";
}
updateVIP();

/* WATCH */
document.getElementById("watchBtn").onclick=()=>{
  document.getElementById("videoFeed").style.display="block";
  loadVideo();
};

function loadVideo(){
  document.getElementById("ytPlayer").src=videos[i];
  startTimer();
}

function nextVideo(){
  i=(i+1)%videos.length;
  totalWatch++;
  localStorage.setItem("watchCount", totalWatch);

  checkVIP();
  updateVIP();

  loadVideo();
  smartAd();
}

/* TIMER */
function startTimer(){
  watch=0;
  let t=setInterval(()=>{
    watch++;
    document.getElementById("timerText").textContent="Watching "+watch+"s";

    if(watch>=10){
      clearInterval(t);
      nextVideo();
    }
  },1000);
}

/* ADS */
function canAd(){
  let now=Date.now();
  if(now-lastAd<15000) return false;
  lastAd=now;
  return true;
}

function smartAd(){
  engage++;
  if(engage%3===0 && canAd()){
    if(confirm("Watch ad for bonus?")){
      RewardAd.show().then(r=>{
        if(r.done) addReward(0.03);
      });
    }
  }
}

/* VIP TASK SYSTEM */
const taskBlocks = ["task-27003","task-27004"];
let taskIndex = 0;

function getTaskConfig(){
  let vip = localStorage.getItem("vip");
  return vip==="yes"
    ? {reward:0.005, limit:10}
    : {reward:0.002, limit:5};
}

let taskData = JSON.parse(localStorage.getItem("taskData")) || {
  date:new Date().toDateString(),
  completed:0
};

function resetTasks(){
  let today=new Date().toDateString();
  if(taskData.date!==today){
    taskData={date:today,completed:0};
    localStorage.setItem("taskData",JSON.stringify(taskData));
  }
}

function loadTask(id){
  let cfg = getTaskConfig();

  if(taskData.completed >= cfg.limit){
    document.getElementById("taskLimit").textContent =
      "⏳ Daily limit reached";
    document.getElementById("taskLimit").style.display="block";
    return;
  }

  document.getElementById("taskLimit").style.display="none";

  let t=document.createElement("adsgram-task");
  t.setAttribute("data-block-id",id);
  t.id="currentTask";

  document.getElementById("currentTask").replaceWith(t);

  t.addEventListener("reward",()=>handleTask());
}

let lastTask=0;

function handleTask(){
  let now=Date.now();
  if(now-lastTask<10000) return alert("Wait...");

  lastTask=now;

  let cfg = getTaskConfig();

  addReward(cfg.reward);

  taskData.completed++;
  localStorage.setItem("taskData",JSON.stringify(taskData));

  document.getElementById("taskMsg").textContent =
    "✅ Earned $" + cfg.reward;
  document.getElementById("taskMsg").style.display="block";

  setTimeout(()=>{document.getElementById("taskMsg").style.display="none";},3000);

  taskIndex=(taskIndex+1)%taskBlocks.length;
  loadTask(taskBlocks[taskIndex]);
}

document.getElementById("taskBtn").onclick=()=>{
  document.getElementById("taskSection").style.display="block";
  resetTasks();
  loadTask(taskBlocks[taskIndex]);
};

/* WALLET */
document.getElementById("walletBtn").onclick=()=>{
  document.getElementById("walletSection").style.display="block";
};

document.getElementById("withdrawBtn").onclick=async()=>{
  let amt=parseFloat(document.getElementById("amount").value);
  let bal=await getBalance();

  if(amt<2) return alert("Min $2");
  if(amt>bal) return alert("Insufficient");

  await setBalance(bal-amt);

  tg.sendData(JSON.stringify({
    action:"withdraw",
    user_id:userId,
    amount:amt
  }));

  alert("Sent");
  updateUI();
};
</script>

</body>
</html>
