<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch & Earn Pro</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<style>
body { font-family: Arial; text-align:center; background:#f5f5f5; }
.button{
  display:block;
  width:220px;
  margin:10px auto;
  padding:12px;
  background:#007bff;
  color:#fff;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<h2>🎥 Watch & Earn</h2>
<p>Balance: $<span id="walletBalance">0.000</span></p>

<button class="button" id="watchBtn">🎬 Watch Videos</button>
<button class="button" id="taskBtn">✅ Tasks</button>
<button class="button" id="walletBtn">👛 Wallet</button>

<!-- VIDEO -->
<div id="videoFeed" style="display:none;"></div>

<!-- TASK -->
<div id="taskSection" style="display:none;">
  <h3>🎯 Tasks</h3>
  <adsgram-task id="currentTask" data-block-id="task-22205"></adsgram-task>
  <p id="taskMsg" style="color:green;display:none;"></p>
</div>

<!-- WALLET -->
<div id="walletSection" style="display:none;">
  <h3>Wallet</h3>

  <select id="method" class="button">
    <option>Opay</option>
    <option>Payeer</option>
    <option>Crypto</option>
  </select>

  <input id="details" class="button" placeholder="Account / Wallet">
  <input id="amount" type="number" class="button" placeholder="Amount">

  <button class="button" id="withdrawBtn">Withdraw</button>
</div>

<!-- REFERRAL -->
<div>
  <h3>👥 Referral</h3>
  <input id="refLink" class="button" readonly>
  <p>Total referrals: <span id="refCount">0</span></p>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const userId = tg.initDataUnsafe.user?.id;
if(!userId){ alert("Unauthorized"); }

const API = "https://api.telebothost.com/bot/properties";

/* ================= ANTI CHEAT ================= */
let lastActionTime = 0;
let actionCount = 0;
let blockUntil = 0;

function canEarn(){
  let now = Date.now();

  if(now < blockUntil){
    alert("⚠️ Too fast! Try later.");
    return false;
  }

  if(now - lastActionTime < 3000){
    actionCount++;
  }else{
    actionCount = 0;
  }

  lastActionTime = now;

  if(actionCount >= 5){
    blockUntil = now + 60000;
    alert("🚫 Suspicious activity");
    return false;
  }

  return true;
}

/* DAILY LIMIT */
function checkDailyLimit(){
  let today = new Date().toDateString();

  let data = JSON.parse(localStorage.getItem("dailyEarn")) || {
    date: today,
    amount: 0
  };

  if(data.date !== today){
    data = {date: today, amount: 0};
  }

  if(data.amount >= 0.5){
    alert("⛔ Daily limit reached");
    return false;
  }

  data.amount += 0.001;
  localStorage.setItem("dailyEarn", JSON.stringify(data));

  return true;
}

/* ================= WALLET ================= */
async function getBalance(){
  let r = await fetch(`${API}/get?key=balance_${userId}`);
  let d = await r.json();
  return parseFloat(d.value)||0;
}

async function setBalance(val){
  await fetch(`${API}/set?key=balance_${userId}&value=${val}`);
}

async function addReward(a){
  if(!canEarn()) return;
  if(!checkDailyLimit()) return;

  let b = await getBalance();
  await setBalance(b + a);
  updateUI();
}

async function updateUI(){
  let b = await getBalance();
  document.getElementById("walletBalance").innerText = b.toFixed(3);
}
updateUI();

/* ================= PV SYSTEM ================= */
let pv = parseInt(localStorage.getItem("pv"))||0;
let level = parseInt(localStorage.getItem("level"))||1;

function updateStats(){
  document.getElementById("pvText").innerText = pv;
  document.getElementById("levelText").innerText = level;
}

function addPV(a){
  if(!canEarn()) return;

  pv += a;

  if(pv >= level*50){
    pv = 0;
    level++;
  }

  localStorage.setItem("pv",pv);
  localStorage.setItem("level",level);

  updateStats();
}

/* PV CONVERT */
async function convertPV(){
  if(pv < 1000) return alert("Need 1000 PV");

  let usd = (pv/1000)*0.1;
  pv = 0;

  localStorage.setItem("pv",0);

  let b = await getBalance();
  await setBalance(b + usd);

  updateUI();
  updateStats();

  alert("Converted $" + usd.toFixed(3));
}

/* ================= REFERRAL ================= */
function getRef(){
  return tg.initDataUnsafe.start_param || null;
}

async function getUser(){
  let r = await fetch(`${API}/get?key=user_${userId}`);
  let d = await r.json();
  return d.value ? JSON.parse(d.value) : null;
}

async function saveUser(data){
  await fetch(`${API}/set?key=user_${userId}&value=${encodeURIComponent(JSON.stringify(data))}`);
}

async function addBalance(uid, amt){
  let r = await fetch(`${API}/get?key=balance_${uid}`);
  let d = await r.json();
  let bal = parseFloat(d.value)||0;
  await fetch(`${API}/set?key=balance_${uid}&value=${bal+amt}`);
}

async function handleReferral(){
  let existing = await getUser();
  if(existing) return;

  let ref = getRef();

  await saveUser({id:userId,referrer:ref});

  if(ref && ref != userId){
    await addBalance(ref, 0.02);

    let r = await fetch(`${API}/get?key=refs_${ref}`);
    let d = await r.json();

    let count = parseInt(d.value)||0;
    count++;

    await fetch(`${API}/set?key=refs_${ref}&value=${count}`);
  }
}
handleReferral();

/* SHOW REF */
document.getElementById("refLink").value =
`https://t.me/YOUR_BOT_USERNAME?start=${userId}`;

async function loadRefs(){
  let r = await fetch(`${API}/get?key=refs_${userId}`);
  let d = await r.json();
  document.getElementById("refCount").innerText = d.value||0;
}
loadRefs();

/* ================= VIDEO ================= */
const videoFeed = document.getElementById("videoFeed");

videoFeed.innerHTML = `
<video id="videoPlayer" width="100%" height="250" autoplay muted playsinline></video>
<p id="timerText">⏳ Watching...</p>

<button class="button" id="likeBtn">👍 Like</button>
<button class="button" id="skipBtn">⏭ Skip</button>

<p>⭐ Level: <span id="levelText">1</span></p>
<p>⚡ PV: <span id="pvText">0</span></p>
<p style="font-size:12px;">1000 PV = $0.1</p>

<button class="button" onclick="convertPV()">💱 Convert PV</button>
<button class="button" id="dailyBtn">🎁 Daily Bonus</button>
<button class="button" id="adBtn">🎁 Watch Ad</button>
`;

let videos=[
"https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4",
"https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/Sintel.mp4",
"https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/TearsOfSteel.mp4"
];

let index=0;

function loadVideo(){
  let p=document.getElementById("videoPlayer");
  p.src=videos[index];
  p.play().catch(()=>{});
  startTimer();
}

function nextVideo(){
  index=(index+1)%videos.length;
  loadVideo();
}

function startTimer(){
  let watch=0;
  let player=document.getElementById("videoPlayer");

  let t=setInterval(()=>{
    if(player.paused){
      clearInterval(t);
      alert("Don't pause video");
      return;
    }

    watch++;
    document.getElementById("timerText").innerText="Watching "+watch+"s";

    if(watch>=10){
      clearInterval(t);
      addReward(0.001);
      addPV(8);
      nextVideo();
    }
  },1000);
}

/* BUTTONS */
document.getElementById("watchBtn").onclick=()=>{
  videoFeed.style.display="block";
  loadVideo();
};

document.getElementById("likeBtn").onclick=()=>addPV(3);
document.getElementById("skipBtn").onclick=()=>nextVideo();

/* DAILY */
document.getElementById("dailyBtn").onclick=()=>{
  let last=localStorage.getItem("daily");
  let today=new Date().toDateString();

  if(last===today) return alert("Already claimed");

  localStorage.setItem("daily",today);
  addReward(0.01);
  addPV(20);
};

/* ADS */
document.getElementById("adBtn").onclick=()=>{
  window.Adsgram.init({blockId:"27001"}).show();
};

/* ================= TASK ================= */
document.getElementById("taskBtn").onclick=()=>{
  document.getElementById("taskSection").style.display="block";

  let t=document.createElement("adsgram-task");
  t.setAttribute("data-block-id","task-22205");
  t.id="currentTask";

  document.getElementById("currentTask").replaceWith(t);

  t.addEventListener("reward",()=>{
    addReward(0.002);
    document.getElementById("taskMsg").innerText="Done";
    document.getElementById("taskMsg").style.display="block";
  });
};

/* ================= WALLET ================= */
document.getElementById("walletBtn").onclick=()=>{
  document.getElementById("walletSection").style.display="block";
};

document.getElementById("withdrawBtn").onclick=async()=>{
  let amt=parseFloat(document.getElementById("amount").value);
  let bal=await getBalance();

  if(amt<2) return alert("Min $2");
  if(amt>bal) return alert("Insufficient");

  await setBalance(bal-amt);

  tg.sendData(JSON.stringify({
    action:"withdraw",
    user_id:userId,
    amount:amt
  }));

  alert("Request sent");
  updateUI();
};
</script>

</body>
</html>
